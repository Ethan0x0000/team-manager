services:
  app:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-m.daocloud.io/docker.io/library/python:3.10-slim}
    container_name: team-manage-app
    ports:
      - "${APP_PORT:-8008}:${APP_PORT:-8008}"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    restart: always
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/team_manage.db
